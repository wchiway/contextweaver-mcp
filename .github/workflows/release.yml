name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g., 0.1.1) (must have tag v0.1.1)"
        required: true
        type: string

permissions:
  contents: write
  id-token: write

env:
  CHUNKER_DIR: crates/chunker

jobs:
  # ── 阶段 1：跨平台编译 native 分片器 ────────────────────────────────
  build:
    name: Build ${{ matrix.target }}
    if: ${{ (github.event_name == 'workflow_dispatch' && !contains(github.event.inputs.version, '-')) || (github.event_name != 'workflow_dispatch' && !contains(github.ref_name, '-')) }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            host: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            host: ubuntu-latest
          - target: x86_64-apple-darwin
            host: macos-13
          - target: aarch64-apple-darwin
            host: macos-latest
          - target: x86_64-pc-windows-msvc
            host: windows-latest
    runs-on: ${{ matrix.host }}
    steps:
      - name: Checkout Code (tag on dispatch)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/v{0}', github.event.inputs.version) || github.ref }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ${{ env.CHUNKER_DIR }}/target
          key: ${{ matrix.target }}-cargo-${{ hashFiles('crates/chunker/Cargo.lock') }}

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build native addon
        working-directory: ${{ env.CHUNKER_DIR }}
        run: pnpm exec napi build --platform --release --target ${{ matrix.target }} --use-napi-cross

      - name: Upload native binding artifact
        uses: actions/upload-artifact@v4
        with:
          name: bindings-${{ matrix.target }}
          path: ${{ env.CHUNKER_DIR }}/*.node
          if-no-files-found: error

  # ── 阶段 2：发布 native 分片器（平台子包 → chunker 主包）────────────
  publish-chunker:
    name: Publish chunker packages
    needs: build
    runs-on: ubuntu-latest
    outputs:
      ver: ${{ steps.rel.outputs.ver }}
      tag: ${{ steps.rel.outputs.tag }}
    steps:
      - name: Checkout Code (tag on dispatch)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/v{0}', github.event.inputs.version) || github.ref }}

      - name: Resolve release version
        id: rel
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            INPUT="${{ github.event.inputs.version }}"
            VER="${INPUT#v}"
            echo "tag=v$VER" >> "$GITHUB_OUTPUT"
            echo "ver=$VER" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "ver=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          cache: "pnpm"

      - name: Upgrade npm for Trusted Publishing (OIDC)
        run: npm i -g npm@^11.5.1

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Verify chunker version matches tag
        working-directory: ${{ env.CHUNKER_DIR }}
        run: |
          PKG="$(node -p "require('./package.json').version")"
          if [ "${{ steps.rel.outputs.ver }}" != "$PKG" ]; then
            echo "Version mismatch: tag v${{ steps.rel.outputs.ver }} != crates/chunker/package.json $PKG"
            exit 1
          fi

      - name: Download all native bindings
        uses: actions/download-artifact@v4
        with:
          path: ${{ env.CHUNKER_DIR }}/artifacts
          pattern: bindings-*
          merge-multiple: true

      - name: Create platform package dirs
        working-directory: ${{ env.CHUNKER_DIR }}
        run: pnpm exec napi create-npm-dirs

      - name: Distribute bindings into platform packages
        working-directory: ${{ env.CHUNKER_DIR }}
        run: pnpm exec napi artifacts --output-dir artifacts --npm-dir npm

      # 注入平台子包到 chunker 主包的 optionalDependencies + 写各子包版本，
      # --skip-optional-publish 仅更新元数据/拷贝产物，发布由下方显式 npm publish 控制（保留 OIDC provenance）
      - name: Prepare chunker packages for publish
        working-directory: ${{ env.CHUNKER_DIR }}
        run: pnpm exec napi pre-publish -t npm --skip-optional-publish

      - name: Publish platform packages to NPM
        working-directory: ${{ env.CHUNKER_DIR }}
        run: |
          for pkg in npm/*/; do
            name="$(node -p "require('./${pkg}package.json').name")"
            if npm view "${name}@${{ steps.rel.outputs.ver }}" version >/dev/null 2>&1; then
              echo "skip ${name}@${{ steps.rel.outputs.ver }} (already published)"
            else
              npm publish "${pkg}" --access public --provenance
            fi
          done

      - name: Publish chunker main package to NPM
        working-directory: ${{ env.CHUNKER_DIR }}
        run: |
          if npm view "@chiway/contextweaver-chunker@${{ steps.rel.outputs.ver }}" version >/dev/null 2>&1; then
            echo "skip chunker main (already published)"
          else
            npm publish --no-git-checks --access public --provenance
          fi

  # ── 阶段 3：发布主应用包 + GitHub Release + MCP Registry ────────────
  publish-main:
    name: Publish main package
    needs: publish-chunker
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code (tag on dispatch)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/v{0}', github.event.inputs.version) || github.ref }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          cache: "pnpm"

      - name: Upgrade npm for Trusted Publishing (OIDC)
        run: npm i -g npm@^11.5.1

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build
        run: pnpm run build:release

      - name: Verify tag matches package.json version
        run: |
          PKG="$(node -p "require('./package.json').version")"
          if [ "${{ needs.publish-chunker.outputs.ver }}" != "$PKG" ]; then
            echo "Version mismatch: tag v${{ needs.publish-chunker.outputs.ver }} != package.json $PKG"
            exit 1
          fi

      - name: Check if version already exists on npm
        id: npmcheck
        run: |
          if npm view @chiway/contextweaver@${{ needs.publish-chunker.outputs.ver }} version >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to NPM
        if: steps.npmcheck.outputs.exists != 'true'
        run: npm publish --no-git-checks --access public --provenance

      - name: Collect changelog input
        id: changelog_input
        run: |
          TAG="${{ needs.publish-chunker.outputs.tag }}"
          PREV_TAG="$(git describe --tags --abbrev=0 "${TAG}^" --match "v*" 2>/dev/null || true)"

          if [ -n "$PREV_TAG" ]; then
            RANGE="$PREV_TAG..$TAG"
          else
            RANGE="$TAG"
          fi

          {
            echo "# Changelog source"
            echo
            echo "Current tag: $TAG"
            if [ -n "$PREV_TAG" ]; then
              echo "Previous tag: $PREV_TAG"
            fi
            echo
            echo "## Commits"
            git log --no-merges --pretty=format:'- %s (%h)' "$RANGE"
          } > changelog-source.md

          echo "previous_tag=$PREV_TAG" >> "$GITHUB_OUTPUT"

      - name: Generate changelog with DeepSeek
        id: ai_changelog
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          set -euo pipefail

          if [ -z "${DEEPSEEK_API_KEY:-}" ]; then
            {
              echo "## ContextWeaver ${{ needs.publish-chunker.outputs.tag }}"
              echo
              echo "### Changelog"
              echo
              cat changelog-source.md
              echo
              echo "### Installation"
              echo
              echo '```bash'
              echo "npm install -g @chiway/contextweaver"
              echo "# or"
              echo "pnpm add -g @chiway/contextweaver"
              echo '```'
            } > release-body.md
            exit 0
          fi

          node <<'NODE'
          const fs = require('fs');
          const source = fs.readFileSync('changelog-source.md', 'utf8');
          const payload = {
            model: 'deepseek-v4-flash',
            messages: [
              {
                role: 'system',
                content:
                  'You are a release engineering assistant. Generate a concise and accurate English stable release changelog from the git commit list. Output Markdown only, with user-facing change highlights, upgrade notes, installation notes, and risk notes. Do not invent information that is not present in the input.',
              },
              {
                role: 'user',
                content: `Generate an English stable release changelog for ContextWeaver ${{ needs.publish-chunker.outputs.tag }}.\n\n${source}`,
              },
            ],
            stream: false,
          };
          fs.writeFileSync('deepseek-request.json', JSON.stringify(payload));
          NODE

          if ! curl -sS -X POST "https://api.deepseek.com/chat/completions" \
            -H "Authorization: Bearer ${DEEPSEEK_API_KEY}" \
            -H "Content-Type: application/json" \
            -d @deepseek-request.json \
            -o deepseek-response.json; then
            echo "DeepSeek request failed; falling back to raw changelog."
            cp changelog-source.md ai-summary.md
          elif ! node <<'NODE'
          const fs = require('fs');
          const response = JSON.parse(fs.readFileSync('deepseek-response.json', 'utf8'));
          const content = response?.choices?.[0]?.message?.content;
          if (!content) {
            console.error(JSON.stringify(response, null, 2));
            process.exit(1);
          }
          fs.writeFileSync('ai-summary.md', content.trim() + '\n');
          NODE
          then
            echo "DeepSeek response did not contain a changelog; falling back to raw changelog."
            cp changelog-source.md ai-summary.md
          fi

          {
            echo "## ContextWeaver ${{ needs.publish-chunker.outputs.tag }}"
            echo
            cat ai-summary.md
            echo
            echo "### Installation"
            echo
            echo '```bash'
            echo "npm install -g @chiway/contextweaver"
            echo "# or"
            echo "pnpm add -g @chiway/contextweaver"
            echo '```'
          } > release-body.md

      - name: Upload changelog artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ needs.publish-chunker.outputs.tag }}-changelog
          path: |
            changelog-source.md
            release-body.md
            ai-summary.md
          if-no-files-found: ignore

      - name: Create GitHub Release
        if: startsWith(needs.publish-chunker.outputs.tag, 'v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.publish-chunker.outputs.tag }}
          generate_release_notes: true
          draft: false
          prerelease: false
          body_path: release-body.md

      - name: Install mcp-publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher
          sudo mv mcp-publisher /usr/local/bin/
          mcp-publisher --version

      - name: Authenticate with MCP Registry
        run: mcp-publisher login github-oidc

      - name: Publish to MCP Registry
        run: mcp-publisher publish
