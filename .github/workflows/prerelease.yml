name: Prerelease

on:
  push:
    tags:
      - "v*-alpha.*"
      - "v*-beta.*"
      - "v*-rc.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Prerelease version (e.g., 1.5.3-alpha.0) (must have tag v1.5.3-alpha.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  create-prerelease:
    name: Build Package and Create GitHub Prerelease
    if: ${{ (github.event_name == 'workflow_dispatch' && contains(github.event.inputs.version, '-')) || (github.event_name != 'workflow_dispatch' && contains(github.ref_name, '-')) }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code (tag on dispatch)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/v{0}', github.event.inputs.version) || github.ref }}

      - name: Resolve prerelease tag
        id: rel
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            INPUT="${{ github.event.inputs.version }}"
            VER="${INPUT#v}"
          else
            VER="${GITHUB_REF_NAME#v}"
          fi

          case "$VER" in
            *-*) ;;
            *)
              echo "Prerelease version must contain a hyphen: $VER"
              exit 1
              ;;
          esac

          echo "tag=v$VER" >> "$GITHUB_OUTPUT"
          echo "ver=$VER" >> "$GITHUB_OUTPUT"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build local npm package
        run: pnpm run build:release

      - name: Verify tag matches package.json version
        run: |
          PKG="$(node -p "require('./package.json').version")"
          if [ "${{ steps.rel.outputs.ver }}" != "$PKG" ]; then
            echo "Version mismatch: tag v${{ steps.rel.outputs.ver }} != package.json $PKG"
            exit 1
          fi

      - name: Pack local npm tarball
        id: pack
        run: |
          mkdir -p artifacts
          TARBALL="$(npm pack --pack-destination artifacts --json | node -e "const fs=require('fs'); const data=JSON.parse(fs.readFileSync(0,'utf8')); console.log(data[0].filename)")"
          echo "tarball=$TARBALL" >> "$GITHUB_OUTPUT"
          echo "tarball_path=artifacts/$TARBALL" >> "$GITHUB_OUTPUT"

      - name: Upload local npm tarball artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.rel.outputs.tag }}-npm-tarball
          path: ${{ steps.pack.outputs.tarball_path }}
          if-no-files-found: error

      - name: Collect changelog input
        id: changelog_input
        run: |
          TAG="${{ steps.rel.outputs.tag }}"
          PREV_TAG="$(git describe --tags --abbrev=0 "${TAG}^" --match "v*" 2>/dev/null || true)"

          if [ -n "$PREV_TAG" ]; then
            RANGE="$PREV_TAG..$TAG"
          else
            RANGE="$TAG"
          fi

          {
            echo "# Changelog source"
            echo
            echo "Current tag: $TAG"
            if [ -n "$PREV_TAG" ]; then
              echo "Previous tag: $PREV_TAG"
            fi
            echo
            echo "## Commits"
            git log --no-merges --pretty=format:'- %s (%h)' "$RANGE"
          } > changelog-source.md

          echo "previous_tag=$PREV_TAG" >> "$GITHUB_OUTPUT"

      - name: Generate changelog with DeepSeek
        id: ai_changelog
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          set -euo pipefail

          if [ -z "${DEEPSEEK_API_KEY:-}" ]; then
            {
              echo "## ContextWeaver ${{ steps.rel.outputs.tag }} prerelease"
              echo
              echo "### Changelog"
              echo
              cat changelog-source.md
              echo
              echo "### Local npm package"
              echo
              echo "Download the attached tarball or workflow artifact, then install it locally:"
              echo
              echo '```bash'
              echo "npm install -g ./${{ steps.pack.outputs.tarball }}"
              echo '```'
              echo
              echo "This prerelease does not publish to npm."
            } > release-body.md
            exit 0
          fi

          node <<'NODE'
          const fs = require('fs');
          const source = fs.readFileSync('changelog-source.md', 'utf8');
          const payload = {
            model: 'deepseek-v4-flash',
            messages: [
              {
                role: 'system',
                content:
                  'You are a release engineering assistant. Generate a concise and accurate English prerelease changelog from the git commit list. Output Markdown only, with user-facing change highlights, risk notes, and local tarball testing instructions. Do not invent information that is not present in the input.',
              },
              {
                role: 'user',
                content: `Generate an English prerelease changelog for ContextWeaver ${{ steps.rel.outputs.tag }}.\n\n${source}`,
              },
            ],
            stream: false,
          };
          fs.writeFileSync('deepseek-request.json', JSON.stringify(payload));
          NODE

          if ! curl -sS -X POST "https://api.deepseek.com/chat/completions" \
            -H "Authorization: Bearer ${DEEPSEEK_API_KEY}" \
            -H "Content-Type: application/json" \
            -d @deepseek-request.json \
            -o deepseek-response.json; then
            echo "DeepSeek request failed; falling back to raw changelog."
            cp changelog-source.md ai-summary.md
          elif ! node <<'NODE'
          const fs = require('fs');
          const response = JSON.parse(fs.readFileSync('deepseek-response.json', 'utf8'));
          const content = response?.choices?.[0]?.message?.content;
          if (!content) {
            console.error(JSON.stringify(response, null, 2));
            process.exit(1);
          }
          fs.writeFileSync('ai-summary.md', content.trim() + '\n');
          NODE
          then
            echo "DeepSeek response did not contain a changelog; falling back to raw changelog."
            cp changelog-source.md ai-summary.md
          fi

          {
            echo "## ContextWeaver ${{ steps.rel.outputs.tag }} prerelease"
            echo
            cat ai-summary.md
            echo
            echo "### Local npm package"
            echo
            echo "Download the attached tarball or workflow artifact, then install it locally:"
            echo
            echo '```bash'
            echo "npm install -g ./${{ steps.pack.outputs.tarball }}"
            echo '```'
            echo
            echo "This prerelease does not publish to npm."
          } > release-body.md

      - name: Upload changelog artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.rel.outputs.tag }}-changelog
          path: |
            changelog-source.md
            release-body.md
            ai-summary.md
          if-no-files-found: ignore

      - name: Create GitHub Prerelease
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.rel.outputs.tag }}
          generate_release_notes: true
          draft: false
          prerelease: true
          body_path: release-body.md
          files: ${{ steps.pack.outputs.tarball_path }}

      # 发布到 MCP Registry
      - name: Install mcp-publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher
          sudo mv mcp-publisher /usr/local/bin/
          mcp-publisher --version

      - name: Authenticate with MCP Registry
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 使用 GitHub token 进行认证
          echo "$GITHUB_TOKEN" | mcp-publisher login github --token-stdin

      - name: Publish to MCP Registry
        run: mcp-publisher publish

          files: ${{ steps.pack.outputs.tarball_path }}
