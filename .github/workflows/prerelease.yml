name: Prerelease

on:
  push:
    tags:
      - "v*-alpha.*"
      - "v*-beta.*"
      - "v*-rc.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Prerelease version (e.g., 1.5.3-alpha.0) (must have tag v1.5.3-alpha.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  create-prerelease:
    name: Create GitHub Prerelease
    if: ${{ (github.event_name == 'workflow_dispatch' && contains(github.event.inputs.version, '-')) || (github.event_name != 'workflow_dispatch' && contains(github.ref_name, '-')) }}
    runs-on: ubuntu-latest

    steps:
      - name: Resolve prerelease tag
        id: rel
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            INPUT="${{ github.event.inputs.version }}"
            VER="${INPUT#v}"
          else
            VER="${GITHUB_REF_NAME#v}"
          fi

          case "$VER" in
            *-*) ;;
            *)
              echo "Prerelease version must contain a hyphen: $VER"
              exit 1
              ;;
          esac

          echo "tag=v$VER" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Prerelease
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.rel.outputs.tag }}
          generate_release_notes: true
          draft: false
          prerelease: true
          body: |
            ## ContextWeaver ${{ steps.rel.outputs.tag }} prerelease

            This prerelease is for GitHub release testing only and does not publish to npm.
