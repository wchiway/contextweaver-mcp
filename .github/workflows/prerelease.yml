name: Prerelease

on:
  push:
    tags:
      - "v*-alpha.*"
      - "v*-beta.*"
      - "v*-rc.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Prerelease version (e.g., 1.5.3-alpha.0) (must have tag v1.5.3-alpha.0)"
        required: true
        type: string

permissions:
  contents: write

env:
  CHUNKER_DIR: crates/chunker

jobs:
  # ── 阶段 1：跨平台编译 native 分片器（验证各平台可构建）────────────
  build:
    name: Build ${{ matrix.target }}
    if: ${{ (github.event_name == 'workflow_dispatch' && contains(github.event.inputs.version, '-')) || (github.event_name != 'workflow_dispatch' && contains(github.ref_name, '-')) }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            host: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            host: ubuntu-latest
          - target: x86_64-apple-darwin
            host: macos-latest
          - target: aarch64-apple-darwin
            host: macos-latest
          - target: x86_64-pc-windows-msvc
            host: windows-latest
    runs-on: ${{ matrix.host }}
    steps:
      - name: Checkout Code (tag on dispatch)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/v{0}', github.event.inputs.version) || github.ref }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ${{ env.CHUNKER_DIR }}/target
          key: ${{ matrix.target }}-cargo-${{ hashFiles('crates/chunker/Cargo.lock') }}

      - name: Install dependencies
        # Only @napi-rs/cli (pure JS) is needed to build the Rust addon below.
        # --ignore-scripts skips node-gyp builds of tree-sitter-* packages, which
        # are unused here and fail on the Windows runner (node-gyp 11 mis-detects
        # VS via a stdout-buffer overflow).
        run: pnpm install --no-frozen-lockfile --ignore-scripts

      - name: Build native addon
        working-directory: ${{ env.CHUNKER_DIR }}
        run: pnpm exec napi build --platform --release --target ${{ matrix.target }} --use-napi-cross

      - name: Upload native binding artifact
        uses: actions/upload-artifact@v4
        with:
          name: bindings-${{ matrix.target }}
          path: ${{ env.CHUNKER_DIR }}/*.node
          if-no-files-found: error

  # ── 阶段 2：打包本地 tarball + 创建 GitHub Prerelease（不发布 npm）──
  prerelease:
    name: Pack tarballs and create GitHub Prerelease
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code (tag on dispatch)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/v{0}', github.event.inputs.version) || github.ref }}

      - name: Resolve prerelease tag
        id: rel
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            INPUT="${{ github.event.inputs.version }}"
            VER="${INPUT#v}"
          else
            VER="${GITHUB_REF_NAME#v}"
          fi

          case "$VER" in
            *-*) ;;
            *)
              echo "Prerelease version must contain a hyphen: $VER"
              exit 1
              ;;
          esac

          echo "tag=v$VER" >> "$GITHUB_OUTPUT"
          echo "ver=$VER" >> "$GITHUB_OUTPUT"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build local npm package
        run: pnpm run build:release

      - name: Verify tag matches package.json version
        run: |
          PKG="$(node -p "require('./package.json').version")"
          if [ "${{ steps.rel.outputs.ver }}" != "$PKG" ]; then
            echo "Version mismatch: tag v${{ steps.rel.outputs.ver }} != package.json $PKG"
            exit 1
          fi

      - name: Download all native bindings
        uses: actions/download-artifact@v4
        with:
          path: ${{ env.CHUNKER_DIR }}/artifacts
          pattern: bindings-*
          merge-multiple: true

      - name: Assemble chunker platform packages
        working-directory: ${{ env.CHUNKER_DIR }}
        run: |
          pnpm exec napi create-npm-dirs
          pnpm exec napi artifacts --output-dir artifacts --npm-dir npm
          pnpm exec napi pre-publish -t npm --skip-optional-publish

      - name: Pack all tarballs
        id: pack
        run: |
          mkdir -p artifacts
          # 主应用包
          MAIN_TARBALL="$(npm pack --pack-destination artifacts --json | node -e "const fs=require('fs'); const data=JSON.parse(fs.readFileSync(0,'utf8')); console.log(data[0].filename)")"
          echo "main_tarball=$MAIN_TARBALL" >> "$GITHUB_OUTPUT"
          # chunker 主包
          (cd "${CHUNKER_DIR}" && npm pack --pack-destination ../../artifacts >/dev/null)
          # 各平台子包
          for pkg in "${CHUNKER_DIR}"/npm/*/; do
            (cd "$pkg" && npm pack --pack-destination "$GITHUB_WORKSPACE/artifacts" >/dev/null) || true
          done
          ls -la artifacts

      - name: Upload tarball artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.rel.outputs.tag }}-tarballs
          path: artifacts/*.tgz
          if-no-files-found: error

      - name: Collect changelog input
        id: changelog_input
        run: |
          TAG="${{ steps.rel.outputs.tag }}"
          PREV_TAG="$(git describe --tags --abbrev=0 "${TAG}^" --match "v*" 2>/dev/null || true)"

          if [ -n "$PREV_TAG" ]; then
            RANGE="$PREV_TAG..$TAG"
          else
            RANGE="$TAG"
          fi

          {
            echo "# Changelog source"
            echo
            echo "Current tag: $TAG"
            if [ -n "$PREV_TAG" ]; then
              echo "Previous tag: $PREV_TAG"
            fi
            echo
            echo "## Commits"
            git log --no-merges --pretty=format:'- %s (%h)' "$RANGE"
          } > changelog-source.md

          echo "previous_tag=$PREV_TAG" >> "$GITHUB_OUTPUT"

      - name: Generate changelog with DeepSeek
        id: ai_changelog
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          set -euo pipefail

          if [ -z "${DEEPSEEK_API_KEY:-}" ]; then
            {
              echo "## ContextWeaver ${{ steps.rel.outputs.tag }} prerelease"
              echo
              echo "### Changelog"
              echo
              cat changelog-source.md
              echo
              echo "### Local npm package"
              echo
              echo "Download the attached main tarball plus the chunker tarball matching your platform, then install:"
              echo
              echo '```bash'
              echo "npm install -g ./${{ steps.pack.outputs.main_tarball }}"
              echo '```'
              echo
              echo "Native chunker is optional — without the matching platform tarball it falls back to the TypeScript path."
              echo
              echo "This prerelease does not publish to npm."
            } > release-body.md
            exit 0
          fi

          node <<'NODE'
          const fs = require('fs');
          const source = fs.readFileSync('changelog-source.md', 'utf8');
          const payload = {
            model: 'deepseek-v4-flash',
            messages: [
              {
                role: 'system',
                content:
                  'You are a release engineering assistant. Generate a concise and accurate English prerelease changelog from the git commit list. Output Markdown only, with user-facing change highlights, risk notes, and local tarball testing instructions. Do not invent information that is not present in the input.',
              },
              {
                role: 'user',
                content: `Generate an English prerelease changelog for ContextWeaver ${{ steps.rel.outputs.tag }}.\n\n${source}`,
              },
            ],
            stream: false,
          };
          fs.writeFileSync('deepseek-request.json', JSON.stringify(payload));
          NODE

          if ! curl -sS -X POST "https://api.deepseek.com/chat/completions" \
            -H "Authorization: Bearer ${DEEPSEEK_API_KEY}" \
            -H "Content-Type: application/json" \
            -d @deepseek-request.json \
            -o deepseek-response.json; then
            echo "DeepSeek request failed; falling back to raw changelog."
            cp changelog-source.md ai-summary.md
          elif ! node <<'NODE'
          const fs = require('fs');
          const response = JSON.parse(fs.readFileSync('deepseek-response.json', 'utf8'));
          const content = response?.choices?.[0]?.message?.content;
          if (!content) {
            console.error(JSON.stringify(response, null, 2));
            process.exit(1);
          }
          fs.writeFileSync('ai-summary.md', content.trim() + '\n');
          NODE
          then
            echo "DeepSeek response did not contain a changelog; falling back to raw changelog."
            cp changelog-source.md ai-summary.md
          fi

          {
            echo "## ContextWeaver ${{ steps.rel.outputs.tag }} prerelease"
            echo
            cat ai-summary.md
            echo
            echo "### Local npm package"
            echo
            echo "Download the attached main tarball plus the chunker tarball matching your platform, then install:"
            echo
            echo '```bash'
            echo "npm install -g ./${{ steps.pack.outputs.main_tarball }}"
            echo '```'
            echo
            echo "Native chunker is optional — without the matching platform tarball it falls back to the TypeScript path."
            echo
            echo "This prerelease does not publish to npm."
          } > release-body.md

      - name: Upload changelog artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.rel.outputs.tag }}-changelog
          path: |
            changelog-source.md
            release-body.md
            ai-summary.md
          if-no-files-found: ignore

      - name: Create GitHub Prerelease
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.rel.outputs.tag }}
          generate_release_notes: true
          draft: false
          prerelease: true
          body_path: release-body.md
          files: artifacts/*.tgz
